name: Build Android APK

run-name: ${{ inputs.version != '' && inputs.version || github.event.head_commit.message || 'Build Android APK' }}

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      version:
        description: 'App version this run builds (e.g. v1.14) -- shown as the run name in the Actions list'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle wrapper
      run: |
        cd ReelsBlocker
        gradle wrapper

    - name: Grant execute permission for gradlew
      run: chmod +x ReelsBlocker/gradlew

    - name: Build with Gradle
      run: |
        cd ReelsBlocker
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: ReelsBlocker/app/build/outputs/apk/debug/app-debug.apk
        
